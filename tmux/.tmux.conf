# Enable automatic windows renumbering
set-option -g renumber-windows on

# Enable extended keys for proper modifier key handling
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g extended-keys-format csi-u

# Passthrough Shift+Enter with correct escape sequence
bind-key -n S-Enter send-keys "\e[13;2u"

# Enable scrolling
set -g mouse on

# Monitor BEL notifications from terminal applications
set-window-option -g monitor-bell on
set-option -g bell-action any
set-option -g visual-bell on

# Get rid of Esc delay
set -s escape-time 0
set -g status-interval 0

# Clipboard
set -g set-clipboard on

# Panes
bind C-w kill-pane
bind S-w kill-window

# Splits
bind C-n split-window -v -c "#{pane_current_path}"
bind C-m split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigation
bind -n C-h select-pane -L
bind -n C-k select-pane -U
bind -n C-l select-pane -R
bind -n C-j select-pane -D
bind C-h resize-pane -L 10
bind C-k resize-pane -U 10
bind C-l resize-pane -R 10
bind C-j resize-pane -D 10

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'main'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set -ga terminal-overrides ",xterm-256color:Tc"

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
